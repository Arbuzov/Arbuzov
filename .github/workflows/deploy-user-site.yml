name: Deploy user site

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-user-site
  cancel-in-progress: true

env:
  TARGET_REPOSITORY: Arbuzov/arbuzov.github.io
  TARGET_BRANCH: master
  TARGET_PATH: user-site

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.ARBUZOV_GITHUB_IO_TOKEN }}
          path: ${{ env.TARGET_PATH }}

      - name: Sync docs/ to target repository root
        run: |
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            docs/ "${TARGET_PATH}/"

      - name: Ensure Pages static publishing
        run: touch "${TARGET_PATH}/.nojekyll"

      - name: Commit and push site updates
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'

          git add -A

          if git diff --cached --quiet; then
            echo 'No site changes to publish'
            exit 0
          fi

          git commit -m 'chore: publish site from Arbuzov/docs'
          git push origin "${TARGET_BRANCH}"
